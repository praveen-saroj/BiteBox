<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
<script src="script.js"></script>

    <link rel="icon" type="image/x-icon" href="images/favicon_io/favicon.ico">

   <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Inter:ital,
   opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap"
    rel="stylesheet">
</head>
<body>
    <header>
    <nav>
        <img src="images/logo1.png" alt="BiteBox" width="180px">
        <ul>
            <li> <a href="home.html" class="active">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="bitedeals.html">Bitedeals</a></li>
            <li><a href="cart.html"><i class="fa-solid fa-cart-plus"></i></a></li>
            <li><a href="login.html"><i class="fa-solid fa-right-to-bracket"></i>Login</a></li>
        </ul>
    </nav>
</header>
<section class="auth-container">
     <div class="auth-box">
        <h2>Login to BiteBox</h2>
        <form>
            <div class="user">
                <input type="email" placeholder="Enter name" name="uname" id="email" required>
                <i class="fa-solid fa-user" id="hidden" onclick="toggle_email();"></i>

            </div>
            
            <div class="user">
                <input type="password" placeholder="Enter Password" name="password"  id="password" required>
                <i class="fa-solid fa-eye" onclick="toggle_password();" id="hidden"></i>
            </div>
            
            <button type="button" onclick="login()">Login</button>
            <p><a href="signup.html">Forgot Password</a></p>
            <p id="error" style="color: red;"></p>
            <p>Don't have an account <a href="signup.html">Signup</a></p>
        </form>
    </div>
</section>
</body>
</html>
